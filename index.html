<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber-X Video Hacker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --glass-bg: rgba(15, 23, 42, 0.7);
            --accent: #0ea5e9; /* Cyber Blue */
            --hacker-green: #22c55e;
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a, #000000);
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            height: 100dvh;
            overflow: hidden;
        }

        .mono { font-family: 'Fira Code', monospace; }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-header {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(14, 165, 233, 0.2);
        }

        .chat-bubble-ai {
            background: rgba(30, 41, 59, 0.7);
            border-left: 3px solid var(--accent);
        }

        .chat-bubble-user {
            background: linear-gradient(135deg, #0369a1 0%, #075985 100%);
        }

        .input-glow:focus {
            outline: none;
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.4);
            border-color: var(--accent);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(14, 165, 233, 0.3); border-radius: 10px; }

        .loading-pulse {
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
    </style>
</head>
<body class="flex flex-col">

    <header class="glass-header p-4 z-20 shrink-0">
        <div class="flex justify-between items-center mb-3">
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></div>
                <h1 class="text-lg font-bold tracking-tight mono text-sky-400">CYBER-X <span class="text-white">v3.0</span></h1>
            </div>
            <button id="settingsBtn" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-sky-500/20 transition-all text-sky-400">
                <i class="fa-solid fa-microchip text-xl"></i>
            </button>
        </div>
        
        <div class="flex gap-2">
            <div class="relative flex-1">
                <input type="text" id="ytUrl" placeholder="Enter Target YouTube URL..." 
                       class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-sm mono input-glow transition-all">
            </div>
            <button id="loadBtn" class="bg-sky-600 hover:bg-sky-500 text-white px-5 rounded-xl text-sm font-bold transition-all flex items-center gap-2 active:scale-95">
                <i class="fa-solid fa-terminal"></i> <span>LOAD</span>
            </button>
        </div>
    </header>

    <main id="chatContainer" class="flex-1 overflow-y-auto p-4 space-y-6">
        <div class="flex flex-col items-start max-w-[90%]">
            <div class="text-[10px] mono text-sky-500 mb-1 ml-1 uppercase tracking-widest">System Initialize</div>
            <div class="chat-bubble-ai glass p-4 rounded-2xl rounded-tl-none shadow-xl text-sm leading-relaxed">
                <p class="mono text-emerald-400 mb-2">>> Connection Established.</p>
                I am your Cyber-X Assistant. Specialized in <span class="text-sky-400 font-bold">Ethical Hacking</span>, <span class="text-sky-400 font-bold">Advanced Coding</span>, and <span class="text-sky-400 font-bold">Server Architecture</span>.
                <br><br>
                Paste a technical video link above to extract intelligence.
            </div>
        </div>
    </main>

    <div id="typingIndicator" class="px-6 py-2 hidden">
        <div class="flex items-center gap-2 text-sky-500 mono text-xs">
            <i class="fa-solid fa-circle-notch animate-spin"></i>
            <span>Processing Data...</span>
        </div>
    </div>

    <footer class="p-4 bg-gradient-to-t from-black to-transparent">
        <form id="chatForm" class="relative max-w-4xl mx-auto">
            <input type="text" id="chatInput" placeholder="Send a command or ask a question..." autocomplete="off"
                   class="w-full bg-slate-900/80 border border-white/10 rounded-2xl pl-5 pr-14 py-4 text-sm input-glow shadow-2xl">
            <button type="submit" id="sendBtn" class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 bg-sky-600 hover:bg-sky-500 text-white rounded-xl flex items-center justify-center transition-all">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </form>
    </footer>

    <div id="settingsModal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 hidden flex items-center justify-center p-6">
        <div class="glass w-full max-w-md rounded-3xl p-8 border-sky-500/30 shadow-[0_0_50px_rgba(14,165,233,0.15)]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold mono text-white flex items-center gap-2">
                    <i class="fa-solid fa-gears text-sky-500"></i> CONFIG_CORE
                </h2>
                <button id="closeSettings" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-2xl"></i></button>
            </div>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-xs mono text-sky-500 uppercase mb-2">OpenRouter API Key</label>
                    <input type="password" id="apiKey" placeholder="sk-or-v1-..." 
                           class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-sm mono input-glow">
                </div>
                <div>
                    <label class="block text-xs mono text-sky-500 uppercase mb-2">LLM Model Identifier</label>
                    <input type="text" id="modelName" placeholder="e.g. google/gemini-2.0-flash-001" 
                           class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-sm mono input-glow">
                </div>
                <button id="saveSettings" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-sky-900/20 transition-all active:scale-95">
                    SAVE CONFIGURATION
                </button>
            </div>
        </div>
    </div>

    <script>
        let videoContext = "";
        let chatHistory = [];
        const container = document.getElementById('chatContainer');

        // Logic to toggle settings
        const settingsModal = document.getElementById('settingsModal');
        document.getElementById('settingsBtn').onclick = () => settingsModal.classList.remove('hidden');
        document.getElementById('closeSettings').onclick = () => settingsModal.classList.add('hidden');

        // Persistence
        window.onload = () => {
            document.getElementById('apiKey').value = localStorage.getItem('hacker_key') || "";
            document.getElementById('modelName').value = localStorage.getItem('hacker_model') || "google/gemini-2.0-flash-001";
        };

        document.getElementById('saveSettings').onclick = () => {
            localStorage.setItem('hacker_key', document.getElementById('apiKey').value);
            localStorage.setItem('hacker_model', document.getElementById('modelName').value);
            settingsModal.classList.add('hidden');
            addMessage("System", "Configuration updated. Cryptographic keys stored.", "ai");
        };

        function addMessage(sender, text, type) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex flex-col ${type === 'user' ? 'items-end' : 'items-start'} max-w-[95%] ${type === 'user' ? 'ml-auto' : ''}`;
            
            const label = type === 'user' ? 'Authorized User' : sender;
            const bubbleClass = type === 'user' ? 'chat-bubble-user rounded-tr-none' : 'chat-bubble-ai rounded-tl-none';

            wrapper.innerHTML = `
                <div class="text-[10px] mono text-slate-500 mb-1 mx-1 uppercase tracking-tighter">${label}</div>
                <div class="${bubbleClass} p-4 rounded-2xl shadow-xl text-sm leading-relaxed whitespace-pre-wrap">${text}</div>
            `;
            container.appendChild(wrapper);
            container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
        }

        // Fetch Transcript via Jina
        document.getElementById('loadBtn').onclick = async () => {
            const url = document.getElementById('ytUrl').value;
            if(!url) return alert("Enter URL first!");

            document.getElementById('loadBtn').innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i>`;
            addMessage("System", `Initiating Jina-Reader intercept on: ${url}`, "ai");

            try {
                const res = await fetch(`https://r.jina.ai/${url}`);
                videoContext = await res.text();
                addMessage("System", "Intelligence extracted. Video transcript cached in local memory. You may now perform analysis.", "ai");
            } catch (e) {
                addMessage("System", "Failed to intercept video data. Check URL or Jina API status.", "ai");
            } finally {
                document.getElementById('loadBtn').innerHTML = `<i class="fa-solid fa-terminal"></i> <span>LOAD</span>`;
            }
        };

        // Handle Chat
        document.getElementById('chatForm').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('chatInput');
            const query = input.value.trim();
            const key = localStorage.getItem('hacker_key');
            const model = localStorage.getItem('hacker_model');

            if(!query) return;
            if(!key) return alert("Config missing: API Key required.");

            addMessage("User", query, "user");
            input.value = "";
            document.getElementById('typingIndicator').classList.remove('hidden');

            // The Powerful System Prompt for the AI Identity
            const systemPrompt = `You are "CYBER-X", an elite Cyber Security Expert, Ethical Hacker, and Master Level Programmer. 
            CONTEXT: The following is a transcript of a YouTube video the user is analyzing: 
            --- 
            ${videoContext} 
            ---
            YOUR CORE RULES:
            1. Analyze the context above with extreme technical precision.
            2. If asked about code, provide high-performance, secure, and optimized solutions.
            3. If asked about hacking, explain the methodology from an ethical/educational perspective (penetration testing, defense, vulnerability research).
            4. You are an expert in all languages (Python, C++, Rust, Go, JS, etc.) and server configs (Nginx, Docker, Kubernetes, Linux Hardening).
            5. Use a professional, slightly 'hacker-style' technical tone.`;

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${key}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": model,
                        "messages": [
                            {"role": "system", "content": systemPrompt},
                            ...chatHistory,
                            {"role": "user", "content": query}
                        ]
                    })
                });

                const data = await response.json();
                const aiMsg = data.choices[0].message.content;
                
                document.getElementById('typingIndicator').classList.add('hidden');
                addMessage("CYBER-X", aiMsg, "ai");
                
                chatHistory.push({"role": "user", "content": query});
                chatHistory.push({"role": "assistant", "content": aiMsg});
                
            } catch (err) {
                document.getElementById('typingIndicator').classList.add('hidden');
                addMessage("System", "Error: API connection timed out or rejected.", "ai");
            }
        };
    </script>
</body>
</html>
