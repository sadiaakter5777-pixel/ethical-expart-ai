<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBER-X PRO | Ultra-Fast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;600&display=swap');
        body { background: #020617; color: #f1f5f9; font-family: 'Inter', sans-serif; height: 100dvh; display: flex; flex-col; overflow: hidden; }
        .mono { font-family: 'Fira Code', monospace; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(14, 165, 233, 0.2); }
        .chat-container { scroll-behavior: smooth; }
        /* Markdown code blocks styling */
        pre { background: #111827 !important; padding: 1rem; border-radius: 0.5rem; margin: 0.5rem 0; overflow-x: auto; border: 1px solid #1e293b; }
        code { font-family: 'Fira Code', monospace; font-size: 0.85rem; }
        .ai-bubble p { margin-bottom: 0.75rem; }
    </style>
</head>
<body>

    <header class="glass p-4 shrink-0 flex flex-col gap-3">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="relative flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-sky-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-sky-500"></span></span>
                <h1 class="font-bold mono text-sky-400 tracking-widest text-sm">CYBER-X_PRO_EXTRACTOR</h1>
            </div>
            <button id="settingsBtn" class="text-sky-400 hover:rotate-90 transition-transform duration-300"><i class="fa-solid fa-gear text-xl"></i></button>
        </div>
        
        <div class="flex gap-2">
            <input type="text" id="ytUrl" placeholder="Target URL..." class="flex-1 bg-black/50 border border-sky-900/50 rounded-lg px-3 py-2 text-xs mono text-sky-300 focus:outline-none focus:border-sky-500">
            <button id="loadBtn" class="bg-sky-600 hover:bg-sky-500 px-4 rounded-lg text-xs font-bold mono">LOAD</button>
        </div>
    </header>

    <main id="chatContainer" class="flex-1 overflow-y-auto p-4 space-y-4 chat-container"></main>

    <div id="fileStatus" class="hidden px-4 py-1 bg-sky-900/20 border-t border-sky-500/30 text-[10px] mono text-sky-400 flex items-center gap-2">
        <i class="fa-solid fa-file-code animate-pulse"></i> <span id="fileName">file_attached.txt</span>
        <button onclick="clearFile()" class="ml-auto text-red-400">REMOVE</button>
    </div>

    <footer class="p-3 bg-slate-950 border-t border-white/5 shadow-2xl">
        <div class="flex items-center gap-2 max-w-4xl mx-auto">
            <input type="file" id="fileInput" class="hidden">
            <button id="attachBtn" class="w-11 h-11 flex items-center justify-center rounded-xl bg-slate-900 border border-white/10 text-sky-400 hover:bg-slate-800 transition-all">
                <i class="fa-solid fa-paperclip text-lg"></i>
            </button>
            
            <div class="flex-1 relative">
                <input type="text" id="chatInput" placeholder="Analyze code, server or video..." class="w-full bg-slate-900 border border-white/10 rounded-xl pl-4 pr-12 py-3 text-sm focus:outline-none focus:border-sky-500">
                <button id="sendBtn" class="absolute right-1.5 top-1.5 w-8 h-8 bg-sky-600 hover:bg-sky-500 rounded-lg text-white transition-all"><i class="fa-solid fa-arrow-up"></i></button>
            </div>
        </div>
    </footer>

    <div id="settingsModal" class="fixed inset-0 bg-black/90 z-50 hidden flex items-center justify-center p-6">
        <div class="glass w-full max-w-xs rounded-2xl p-6">
            <h2 class="mono text-sky-400 mb-4 flex items-center gap-2"><i class="fa-solid fa-shield-halved"></i> ACCESS_CONTROL</h2>
            <input type="password" id="apiKey" placeholder="OpenRouter API Key" class="w-full bg-black border border-sky-900 p-3 rounded-lg mb-3 text-xs mono">
            <input type="text" id="modelName" placeholder="Model (e.g., deepseek/deepseek-r1:free)" class="w-full bg-black border border-sky-900 p-3 rounded-lg mb-4 text-xs mono">
            <button id="saveConfig" class="w-full bg-sky-600 py-3 rounded-lg font-bold mono text-sm">INIT_SAVE</button>
        </div>
    </div>

    <script>
        let videoContext = "";
        let fileContext = "";
        let chatHistory = [];
        const chatContainer = document.getElementById('chatContainer');

        // File Attachment Logic
        const fileInput = document.getElementById('fileInput');
        document.getElementById('attachBtn').onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('fileStatus').classList.remove('hidden');
            document.getElementById('fileName').innerText = file.name.toUpperCase();

            const reader = new FileReader();
            reader.onload = (event) => {
                fileContext = `[ATTACHED_FILE: ${file.name}]\nCONTENT:\n${event.target.result}`;
                addMessage("SYSTEM", `File **${file.name}** has been ingested into local memory buffers.`, "ai");
            };
            reader.readAsText(file);
        };

        function clearFile() {
            fileContext = "";
            fileInput.value = "";
            document.getElementById('fileStatus').classList.add('hidden');
        }

        // Settings Logic
        document.getElementById('settingsBtn').onclick = () => document.getElementById('settingsModal').classList.toggle('hidden');
        document.getElementById('saveConfig').onclick = () => {
            localStorage.setItem('or_key', document.getElementById('apiKey').value);
            localStorage.setItem('or_model', document.getElementById('modelName').value);
            document.getElementById('settingsModal').classList.add('hidden');
        };

        window.onload = () => {
            document.getElementById('apiKey').value = localStorage.getItem('or_key') || "";
            document.getElementById('modelName').value = localStorage.getItem('or_model') || "google/gemini-2.0-flash-001";
            addMessage("CYBER-X", "System Ready. Upload a file or load a URL to begin analysis.", "ai");
        };

        function addMessage(sender, text, type) {
            const div = document.createElement('div');
            div.className = `flex flex-col ${type === 'user' ? 'items-end' : 'items-start'}`;
            div.innerHTML = `
                <span class="text-[9px] mono text-slate-500 mb-1 uppercase">${sender}</span>
                <div class="${type === 'user' ? 'bg-sky-700 text-white' : 'glass ai-bubble'} p-3 rounded-xl max-w-[90%] text-sm shadow-lg">
                    ${type === 'user' ? text : marked.parse(text)}
                </div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTo(0, chatContainer.scrollHeight);
            hljs.highlightAll();
            return div.querySelector('.ai-bubble');
        }

        // Jina API Fetch
        document.getElementById('loadBtn').onclick = async () => {
            const url = document.getElementById('ytUrl').value;
            if(!url) return;
            document.getElementById('loadBtn').innerText = "...";
            try {
                const res = await fetch(`https://r.jina.ai/${url}`);
                videoContext = await res.text();
                addMessage("SYSTEM", "Data Stream Intercepted. Video content is now in context memory.", "ai");
            } catch (e) {
                addMessage("SYSTEM", "Intercept failed. Resource unreachable.", "ai");
            }
            document.getElementById('loadBtn').innerText = "LOAD";
        };

        // Stream Execution Logic (Fast Processing)
        document.getElementById('sendBtn').onclick = async () => {
            const input = document.getElementById('chatInput');
            const userMsg = input.value.trim();
            const key = localStorage.getItem('or_key');
            const model = localStorage.getItem('or_model');

            if(!userMsg || !key) return;
            
            addMessage("USER", userMsg, "user");
            input.value = "";

            // Dynamic Response Bubble for Streaming
            const aiBubble = addMessage("CYBER-X", "...", "ai");
            let fullAiResponse = "";

            const systemPrompt = `You are a Cyber Security, Coding & Server Architecture Specialist. 
            YT_CONTEXT: ${videoContext}
            FILE_CONTEXT: ${fileContext}
            Task: Provide ultra-fast, high-precision technical responses. Use Markdown for code.`;

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${key}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: model,
                        stream: true, // Speed optimization
                        messages: [
                            {role: "system", content: systemPrompt},
                            ...chatHistory,
                            {role: "user", content: userMsg}
                        ]
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                const content = data.choices[0].delta.content || "";
                                fullAiResponse += content;
                                aiBubble.innerHTML = marked.parse(fullAiResponse);
                                hljs.highlightAll(); // Live highlighting
                                chatContainer.scrollTo(0, chatContainer.scrollHeight);
                            } catch (e) {}
                        }
                    }
                }
                chatHistory.push({role: "user", content: userMsg}, {role: "assistant", content: fullAiResponse});
            } catch (err) {
                aiBubble.innerText = "CRITICAL_ERROR: Pipeline Broken.";
            }
        };
    </script>
</body>
</html>
