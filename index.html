<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBER-X ULTIMATE | Hacker Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;600&display=swap');
        
        body { 
            background: #020617; 
            color: #f1f5f9; 
            font-family: 'Inter', sans-serif; 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        .mono { font-family: 'Fira Code', monospace; }
        
        /* Glassmorphism Design */
        .glass { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(14, 165, 233, 0.15); 
        }

        .chat-bubble-ai {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 4px solid #0ea5e9;
        }

        /* Live Typing Animation */
        .typing::after {
            content: '|';
            animation: blink 0.8s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* Mobile Adjustments */
        pre { 
            max-width: 100%; 
            overflow-x: auto; 
            background: #0f172a !important; 
            padding: 12px; 
            border-radius: 8px; 
            font-size: 13px;
            margin: 10px 0;
        }
    </style>
</head>
<body class="bg-slate-950">

    <header class="glass p-4 z-30 shrink-0">
        <div class="flex justify-between items-center mb-3">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_8px_#10b981]"></div>
                <h1 class="font-bold mono text-sky-400 text-sm tracking-tighter">CYBER-X_V4.0_PRO</h1>
            </div>
            <button id="settingsBtn" class="text-sky-400 hover:text-sky-300 transition-all"><i class="fa-solid fa-microchip text-xl"></i></button>
        </div>
        <div class="flex gap-2">
            <input type="text" id="ytUrl" placeholder="Paste target YouTube URL..." class="flex-1 bg-black/40 border border-white/10 rounded-xl px-4 py-2 text-xs mono text-sky-300 focus:outline-none focus:border-sky-500">
            <button id="loadBtn" class="bg-sky-600 hover:bg-sky-500 px-4 rounded-xl text-[10px] font-bold mono transition-all active:scale-95">EXTRACT</button>
        </div>
    </header>

    <main id="chatContainer" class="flex-1 overflow-y-auto p-4 space-y-6 flex flex-col"></main>

    <div id="fileInfo" class="hidden px-4 py-2 bg-sky-950/40 border-t border-sky-500/20 flex items-center justify-between">
        <div class="flex items-center gap-2 text-[10px] mono text-emerald-400">
            <i class="fa-solid fa-file-shield"></i>
            <span id="attachedFileName">LOG.TXT LOADED</span>
        </div>
        <button onclick="clearAttachment()" class="text-red-400 text-[10px] mono font-bold">UNLOAD</button>
    </div>

    <footer class="p-4 glass border-t border-white/5">
        <div class="flex items-center gap-2 max-w-4xl mx-auto relative">
            
            <input type="file" id="fileUploadInput" class="hidden">
            <button id="attachBtn" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-slate-900/80 border border-white/10 text-sky-400 hover:bg-sky-800/40 transition-all active:scale-90">
                <i class="fa-solid fa-paperclip text-lg"></i>
            </button>
            
            <div class="flex-1 relative">
                <input type="text" id="chatInput" placeholder="Send intelligence request..." autocomplete="off"
                       class="w-full bg-slate-900 border border-white/10 rounded-2xl pl-4 pr-12 py-3.5 text-sm focus:outline-none focus:border-sky-500 shadow-inner">
                <button id="sendBtn" class="absolute right-1.5 top-1.5 w-9 h-9 bg-sky-600 hover:bg-sky-500 rounded-xl text-white transition-all active:scale-95 shadow-lg">
                    <i class="fa-solid fa-arrow-up"></i>
                </button>
            </div>
        </div>
    </footer>

    <div id="settingsModal" class="fixed inset-0 bg-black/95 z-50 hidden flex items-center justify-center p-6">
        <div class="glass w-full max-w-sm rounded-3xl p-8 border-sky-500/30">
            <h2 class="mono text-sky-400 mb-6 flex items-center gap-2 font-bold"><i class="fa-solid fa-key"></i> ACCESS_CONTROL</h2>
            <div class="space-y-4">
                <input type="password" id="apiKeyInput" placeholder="OpenRouter API Key" class="w-full bg-black border border-sky-900 p-4 rounded-xl text-xs mono">
                <input type="text" id="modelInput" placeholder="Model (e.g., google/gemini-2.0-flash-001)" class="w-full bg-black border border-sky-900 p-4 rounded-xl text-xs mono">
                <button id="saveConfig" class="w-full bg-sky-600 py-4 rounded-xl font-bold mono text-sm shadow-lg shadow-sky-900/20">SAVE & INITIALIZE</button>
            </div>
        </div>
    </div>

    <script>
        let videoData = "";
        let fileData = "";
        let history = [];

        const chatBox = document.getElementById('chatContainer');
        const fileIn = document.getElementById('fileUploadInput');
        const attachBtn = document.getElementById('attachBtn');

        // Settings logic
        document.getElementById('settingsBtn').onclick = () => document.getElementById('settingsModal').classList.remove('hidden');
        document.getElementById('saveConfig').onclick = () => {
            localStorage.setItem('cyber_key', document.getElementById('apiKeyInput').value);
            localStorage.setItem('cyber_model', document.getElementById('modelInput').value);
            document.getElementById('settingsModal').classList.add('hidden');
        };

        // File Attachment Logic (100% Functional)
        attachBtn.onclick = () => fileIn.click();
        fileIn.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (ev) => {
                fileData = `[FILE_UPLOADED: ${file.name}]\n\nCONTENT:\n${ev.target.result}`;
                document.getElementById('fileInfo').classList.remove('hidden');
                document.getElementById('attachedFileName').innerText = file.name.toUpperCase();
                addMessage("SYSTEM", `Data packet **${file.name}** has been uploaded to local context buffers.`, "ai");
            };
            reader.readAsText(file);
        };

        function clearAttachment() {
            fileData = "";
            fileIn.value = "";
            document.getElementById('fileInfo').classList.add('hidden');
        }

        // Add Message to UI
        function addMessage(sender, text, type) {
            const div = document.createElement('div');
            div.className = `flex flex-col ${type === 'user' ? 'items-end' : 'items-start'} animate-in fade-in duration-300`;
            
            const label = type === 'user' ? 'USER_AUTH' : sender;
            const contentClass = type === 'user' ? 'bg-sky-600 text-white rounded-tr-none' : 'chat-bubble-ai rounded-tl-none';

            div.innerHTML = `
                <span class="text-[9px] mono text-slate-500 mb-1 px-1 uppercase tracking-widest">${label}</span>
                <div class="p-4 rounded-2xl max-w-[92%] text-sm shadow-2xl ${contentClass}">
                    <div class="message-content leading-relaxed">${type === 'user' ? text : marked.parse(text)}</div>
                </div>
            `;
            chatBox.appendChild(div);
            chatBox.scrollTo(0, chatBox.scrollHeight);
            if(type === 'ai') hljs.highlightAll();
            return div.querySelector('.message-content');
        }

        // Jina Reader Extraction
        document.getElementById('loadBtn').onclick = async () => {
            const url = document.getElementById('ytUrl').value;
            if(!url) return;
            
            const btn = document.getElementById('loadBtn');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin"></i>';
            
            try {
                const res = await fetch(`https://r.jina.ai/${url}`);
                videoData = await res.text();
                addMessage("SYSTEM", "YouTube stream intercepted successfully. Analysis ready.", "ai");
            } catch (e) {
                addMessage("SYSTEM", "Failed to intercept URL. Signal lost.", "ai");
            }
            btn.innerHTML = "EXTRACT";
        };

        // STREAMING CHAT LOGIC (Real-time Feedback)
        document.getElementById('sendBtn').onclick = async (e) => {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            const key = localStorage.getItem('cyber_key');
            const model = localStorage.getItem('cyber_model');

            if(!msg || !key) return;

            addMessage("USER", msg, "user");
            input.value = "";

            // Create placeholder for AI and start streaming
            const aiDisplay = addMessage("CYBER-X", "...", "ai");
            aiDisplay.classList.add('typing');
            let fullContent = "";

            const systemPrompt = `You are an elite Cyber Security and Full Stack Expert. 
            CONTEXT_VIDEO: ${videoData}
            CONTEXT_FILE: ${fileData}
            Respond only as a technical expert. Use Markdown for all code snippets.`;

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${key}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: model,
                        stream: true, // REAL-TIME STREAMING
                        messages: [
                            {role: "system", content: systemPrompt},
                            ...history,
                            {role: "user", content: msg}
                        ]
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                const delta = data.choices[0].delta.content || "";
                                fullContent += delta;
                                
                                // Real-time Update
                                aiDisplay.innerHTML = marked.parse(fullContent);
                                hljs.highlightAll();
                                chatBox.scrollTo(0, chatBox.scrollHeight);
                            } catch (e) {}
                        }
                    }
                }
                aiDisplay.classList.remove('typing');
                history.push({role: "user", content: msg}, {role: "assistant", content: fullContent});

            } catch (err) {
                aiDisplay.innerText = "CRITICAL_FAILURE: Connection Interrupted.";
            }
        };

        window.onload = () => {
            document.getElementById('apiKeyInput').value = localStorage.getItem('cyber_key') || "";
            document.getElementById('modelInput').value = localStorage.getItem('cyber_model') || "google/gemini-2.0-flash-001";
            addMessage("CYBER-X", "Awaiting target link or data packet for analysis...", "ai");
        };
    </script>
</body>
</html>
