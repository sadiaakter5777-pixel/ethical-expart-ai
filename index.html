<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBER-X V8</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/tokyo-night-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<style>

body{
background:#020617;
color:#e2e8f0;
font-family:system-ui;
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

#chatBox{
flex:1;
overflow:auto;
padding:20px;
}

.msg{
margin-bottom:16px;
max-width:90%;
}

.user{
background:#075985;
padding:12px;
border-radius:12px;
margin-left:auto;
}

.ai{
background:#0f172a;
padding:12px;
border-radius:12px;
}

pre{
background:#020617;
padding:16px;
border-radius:10px;
margin-top:10px;
position:relative;
border:1px solid #334155;
}

.copy-btn{
position:absolute;
top:6px;
right:6px;
font-size:11px;
background:#22c55e;
padding:4px 8px;
border-radius:4px;
cursor:pointer;
color:black;
}

.run-btn{
position:absolute;
top:6px;
right:70px;
font-size:11px;
background:#38bdf8;
padding:4px 8px;
border-radius:4px;
cursor:pointer;
color:black;
}

#preview{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:none;
flex-direction:column;
z-index:999;
}

#previewHeader{
background:#020617;
color:white;
padding:6px;
display:flex;
justify-content:space-between;
align-items:center;
}

#previewFrame{
flex:1;
border:none;
}

</style>
</head>

<body>

<div id="chatBox"></div>

<div class="p-4 bg-slate-900 flex gap-2">

<input id="chatInput"
class="flex-1 p-3 rounded bg-black border border-slate-700"
placeholder="Ask something...">

<button id="sendBtn"
class="bg-sky-600 px-4 rounded">
Send
</button>

<input type="file" id="fileInput" hidden>

<button onclick="fileInput.click()"
class="bg-slate-700 px-4 rounded">
File
</button>

</div>


<div id="preview">

<div id="previewHeader">

<span>LIVE PREVIEW</span>

<button onclick="closePreview()">✕</button>

</div>

<iframe id="previewFrame"></iframe>

</div>


<script>

const chatBox=document.getElementById("chatBox")

const input=document.getElementById("chatInput")

const sendBtn=document.getElementById("sendBtn")

const preview=document.getElementById("preview")

const frame=document.getElementById("previewFrame")

let autoScroll=true

let fileContext=""

let chatHistory=[]


chatBox.addEventListener("scroll",()=>{

const nearBottom=
chatBox.scrollHeight-chatBox.scrollTop-chatBox.clientHeight<120

autoScroll=nearBottom

})


function scrollBottom(){

if(autoScroll){

chatBox.scrollTop=chatBox.scrollHeight

}

}


function addMessage(text,type){

const div=document.createElement("div")

div.className="msg "+type

div.innerHTML=type==="user"
?text
:marked.parse(text)

chatBox.appendChild(div)

document.querySelectorAll("pre code")
.forEach(el=>hljs.highlightElement(el))

scrollBottom()

return div

}



function copyCode(btn){

const code=btn.parentElement.querySelector("code").innerText

navigator.clipboard.writeText(code)

btn.innerText="COPIED"

setTimeout(()=>btn.innerText="COPY",1200)

}



function runCode(encoded){

const code=decodeURIComponent(encoded)

preview.style.display="flex"

let html=""
let css=""
let js=""

if(code.includes("<html")){

frame.srcdoc=code

return

}

if(code.includes("function")||code.includes("console")){

js=code

}

if(code.includes("{")&&code.includes("}")){

css=code

}

html=`
<html>
<head>
<style>${css}</style>
</head>

<body>

<div id="app"></div>

<script>

${js}

<\/script>

</body>
</html>
`

frame.srcdoc=html

}



function closePreview(){

preview.style.display="none"

}



const renderer=new marked.Renderer()

renderer.code=function(code,lang){

return`

<pre>

<button class="copy-btn"
onclick="copyCode(this)">
COPY
</button>

<button class="run-btn"
onclick="runCode(\`${encodeURIComponent(code)}\`)">
RUN CODE
</button>

<code class="language-${lang}">
${code}
</code>

</pre>

`

}

marked.setOptions({renderer})


fileInput.onchange=e=>{

const file=e.target.files[0]

const reader=new FileReader()

reader.onload=ev=>{

fileContext=
"FILE:"+file.name+"\n"+ev.target.result

}

reader.readAsText(file)

}



sendBtn.onclick=async()=>{

const msg=input.value.trim()

if(!msg)return

addMessage(msg,"user")

input.value=""

const aiDiv=addMessage("...","ai")

let result=""

const API_KEY=localStorage.getItem("cx_key")

const MODEL="deepseek/deepseek-chat"


const systemPrompt=

`You are an elite coding assistant.

Language rule:
If user writes Bangla reply Bangla.
If English reply English.

Never mix languages.

If writing code always give full code.

Context:
${fileContext}`



const res=await fetch(
"https://openrouter.ai/api/v1/chat/completions",
{

method:"POST",

headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json"
},

body:JSON.stringify({

model:MODEL,

stream:true,

messages:[
{role:"system",content:systemPrompt},
...chatHistory,
{role:"user",content:msg}
]

})

})


const reader=res.body.getReader()

const decoder=new TextDecoder()


while(true){

const {done,value}=await reader.read()

if(done)break

const chunk=decoder.decode(value)

const lines=chunk.split("\n")

for(const line of lines){

if(!line.startsWith("data:"))continue

if(line.includes("[DONE]"))continue

try{

const json=
JSON.parse(line.replace("data:",""))

const token=
json.choices[0].delta.content

if(token){

result+=token

aiDiv.innerHTML=marked.parse(result)

scrollBottom()

}

}catch{}

}

}

chatHistory.push(
{role:"user",content:msg},
{role:"assistant",content:result}
)

}



</script>

</body>
</html>
